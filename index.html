<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ccircle cx='8' cy='8' r='6' fill='none' stroke='%23888' stroke-width='1.5'/%3E%3C/svg%3E"
    />
    <title>Keramos</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        background: #000;
        color: #fff;
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        overflow: hidden;
        overscroll-behavior: none;
        touch-action: none;
      }

      button.reset {
        position: fixed;
        left: 50%;
        bottom: 32px;
        transform: translateX(-50%);
        z-index: 2;
        background: transparent;
        color: #fff;
        border: 1px solid rgba(255, 255, 255, 0.35);
        font: inherit;
        font-size: 11px;
        letter-spacing: 0.2em;
        padding: 10px 22px;
        cursor: pointer;
        touch-action: manipulation;
      }
      button.reset:hover {
        border-color: #fff;
      }

      a.corner {
        position: fixed;
        bottom: 42px;
        z-index: 2;
        color: rgba(255, 255, 255, 0.45);
        text-decoration: none;
        font-size: 11px;
        letter-spacing: 0.2em;
        padding: 10px;
        touch-action: manipulation;
      }
      a.corner:hover {
        color: #fff;
      }
      a.corner.left {
        left: 22px;
      }
      a.corner.right {
        right: 22px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
